<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4ecd8" />
  <title>Deutsch · Almanca Öğrenme Platformu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="root">
    <!-- Giriş ekranı -->
    <section id="auth-screen" class="screen">
      <div class="auth-card">
        <h1 class="brand">Deutsch <span class="brand-sub">Lernen</span></h1>
        <p class="subtitle">A1 · A2 · B1 — her cihazda güncel kelime kartların.</p>

        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="login" role="tab">Giriş yap</button>
          <button class="tab" data-tab="register" role="tab">Kayıt ol</button>
        </div>

        <form id="auth-form" autocomplete="off">
          <label>
            <span>Kullanıcı adı</span>
            <input id="username" type="text" name="username" required minlength="3" maxlength="30" autocomplete="username" />
          </label>
          <label>
            <span>Şifre</span>
            <input id="password" type="password" name="password" required minlength="6" autocomplete="current-password" />
          </label>
          <div id="auth-error" class="error" hidden></div>
          <button id="auth-submit" class="primary" type="submit">Giriş yap</button>
        </form>
      </div>
    </section>

    <!-- Uygulama -->
    <section id="app-screen" class="screen" hidden>
      <header class="topbar">
        <div class="topbar-left">
          <h2 class="brand small">Deutsch</h2>
          <div class="level-switch" role="tablist" aria-label="Seviye">
            <button class="level-btn" data-level="a1">A1</button>
            <button class="level-btn" data-level="a2">A2</button>
            <button class="level-btn" data-level="b1">B1</button>
          </div>
        </div>
        <div class="topbar-right">
          <span class="hello" id="hello"></span>
          <button id="logout-btn" class="ghost">Çıkış</button>
        </div>
      </header>

      <nav class="mode-switch" aria-label="Mod">
        <button class="mode-btn active" data-mode="cards">Kelime Kartları</button>
        <button class="mode-btn" data-mode="quiz">Quiz</button>
      </nav>

      <section class="filters">
        <div id="group-chips" class="chips" aria-label="Gruplar"></div>
        <div class="toolbar">
          <label class="check">
            <input type="checkbox" id="hide-known" />
            <span>Sadece bilmediklerim</span>
          </label>
          <button id="shuffle-btn" class="ghost small">Karıştır</button>
        </div>
      </section>

      <div class="progress-wrap">
        <div class="progress"><div id="progress-bar"></div></div>
        <span id="progress-text" class="progress-text">0 / 0</span>
      </div>

      <!-- Kelime kartları modu -->
      <section id="cards-mode" class="mode-panel">
        <div id="card-area" class="card-area">
          <div id="card" class="card" tabindex="0" aria-live="polite">
            <div class="card-face front">
              <div class="card-group" id="card-group"></div>
              <div class="card-word" id="card-word">Yükleniyor…</div>
              <div class="card-hint">Çevirmek için karta dokun</div>
            </div>
            <div class="card-face back">
              <div class="card-tr" id="card-tr"></div>
              <div class="card-ex" id="card-ex"></div>
            </div>
          </div>
        </div>
        <div class="card-controls">
          <button id="prev-btn" class="ghost">‹ Önceki</button>
          <button id="unknown-btn" class="danger">Tekrar et</button>
          <button id="known-btn" class="success">Biliyorum</button>
          <button id="next-btn" class="ghost">Sonraki ›</button>
        </div>
        <div class="card-meta">
          <span id="card-counter">0 / 0</span>
        </div>
      </section>

      <!-- Quiz modu -->
      <section id="quiz-mode" class="mode-panel" hidden>
        <div class="quiz-head">
          <div class="quiz-dir-switch">
            <button class="qdir-btn active" data-dir="de-tr">DE → TR</button>
            <button class="qdir-btn" data-dir="tr-de">TR → DE</button>
          </div>
          <div class="quiz-stats">
            <span>Skor: <b id="quiz-score">0</b></span>
            <span>Üst üste: <b id="quiz-streak">0</b></span>
          </div>
        </div>
        <div class="quiz-question" id="quiz-question">Yükleniyor…</div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
        <button id="quiz-next" class="primary" hidden>Sıradaki</button>
      </section>
    </section>

    <div id="toast" class="toast" hidden></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
